name: Deploy WFA Partners

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync dist to OVH
        uses: easingthemes/ssh-deploy@v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.OVH_HOST }}
          REMOTE_PORT: ${{ secrets.OVH_PORT }}
          REMOTE_USER: ${{ secrets.OVH_USER }}
          SOURCE: "dist/"
          TARGET: "${{ secrets.OVH_DEPLOY_PATH }}/dist/"
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: "node_modules, .env, .env.production, data"

      - name: Copy ecosystem.config.cjs to OVH
        uses: easingthemes/ssh-deploy@v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.OVH_HOST }}
          REMOTE_PORT: ${{ secrets.OVH_PORT }}
          REMOTE_USER: ${{ secrets.OVH_USER }}
          SOURCE: "ecosystem.config.cjs"
          TARGET: "${{ secrets.OVH_DEPLOY_PATH }}"

      - name: Restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          port: ${{ secrets.OVH_PORT }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd ${{ secrets.OVH_DEPLOY_PATH }}
            mkdir -p logs
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
